version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        patterns:
          - "pytest*"
          - "mypy*"
          - "black"
          - "isort"
          - "flake8*"
          - "ruff*"
