name: CI

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'CHANGELOG.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
      - name: VectorBT smoke
        run: |
          python - <<'PY'
          import pandas as pd, vectorbt as vbt, pathlib
          assert hasattr(pd.Series, 'vbt'), 'Series.vbt accessor missing'
          p = pathlib.Path(vbt.__file__).resolve()
          print('vectorbt OK:', getattr(vbt, '__version__', 'unknown'), 'at', p)
          PY

  test:
    needs: smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pinned
            python-version: "3.12"
            vectorbt: "vectorbt==0.28.1"
            quantstats: "quantstats>=0.0.62"
            use_stub: "0"
          - name: floating-with-quantstats
            python-version: "3.12"
            vectorbt: "vectorbt>=0.28.1"
            quantstats: "quantstats>=0.0.62"
            use_stub: "0"
          - name: floating-minimal
            python-version: "3.12"
            vectorbt: "vectorbt>=0.28.1"
            quantstats: ""
            use_stub: "0"
    name: tests (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pip install pytest-xdist pytest-cov
          pip install "${{ matrix.vectorbt }}"
          if [ -n "${{ matrix.quantstats }}" ]; then
            pip install "${{ matrix.quantstats }}"
          fi
      - name: Run tests
        env:
          USE_VBT_STUB: "${{ matrix.use_stub }}"
        run: |
          make test
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.name }}
          path: |
            pytest-junit.xml
            coverage.xml
          if-no-files-found: ignore
          retention-days: 7
