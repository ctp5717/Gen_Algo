name: CI

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'CHANGELOG.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
      - name: VectorBT smoke
        run: |
          python - <<'PY'
          import pandas as pd, vectorbt as vbt, pathlib
          assert hasattr(pd.Series, 'vbt'), 'Series.vbt accessor missing'
          p = pathlib.Path(vbt.__file__).resolve()
          print('vectorbt OK:', getattr(vbt, '__version__', 'unknown'), 'at', p)
          PY

  test:
    needs: smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pip install pytest-xdist pytest-cov
      - name: Run tests
        env:
          USE_VBT_STUB: "1"
        run: |
          pytest -q -n auto --cov=. --cov-branch --cov-report=xml --cov-fail-under=80 --strict-markers --strict-config -W error::DeprecationWarning --junitxml=pytest-junit.xml --durations=10
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            pytest-junit.xml
            coverage.xml
          retention-days: 7
